<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>TEST </title>
</head>
<body class="bg-white">

    <header class="w-[300px] mx-auto mt-3 mb-10 p-[1px] rounded-[2rem] border-green-300 border-solid border-4
     sm:w-[600px] sm:p-[4px] md:w-[700px] md:p-[6px] lg:w-[1000px] lg:p-[6px] 
     xl:w-[1260px] xl:p-[6px] 2xl:w-[1200px] 2xl:p-[6px] [@media(min-width:1920px)]:w-[1350px] [@media(min-width:1920px)]:p-[8px]">
        <div class="bg-[url(imagenes/retuloo.png)] bg-[length:100%_100%] rounded-[1.8rem] pt-1 py-10 sm:py-12 md:py-14 lg:py-16 xl:py-20
        2xl:py-24 [@media(min-width:1920px)]:py-24">
          
        </div>
    </header>

  


    <main class="px-4">
      

        <form id="form-test">
            <div id="contenedor-pregunta" class="grid grid-cols-1 justify-items-center mt-10 w-full sm:max-w-[450px] lg:max-w-[500px] mx-auto">
            </div>

<div class="mt-10 text-center mb-5 space-x-2">
    <button id="btnAnterior" class="mb-1 border rounded-2xl border-green-500 px-2 cursor-pointer
       bg-green-400    text-white font-bold border-4
      transition-all duration-300 hover:scale-105 hover:shadow-lg active:scale-95" type="button">PREGUNTA ANTERIOR</button>
  
    <button id="btnSiguiente" class="mb-1 border rounded-2xl  border-green-500  px-2 cursor-pointer
        bg-green-400  text-white font-bold border-4
      transition-all duration-300 hover:scale-105 hover:shadow-lg active:scale-95" type="button">PREGUNTA SIGUIENTE</button>
   
   
</div>


         
        </form>
    </main>

    <script src="js/class-test.js"></script>
    <script src="js/dato-test.js"></script>
    <script src="js/test.js"></script>
</body>
</html>
